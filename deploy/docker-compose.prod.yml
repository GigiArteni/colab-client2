# Coolify resource: colab-client2 (production).

services:
    web:
        # First deploy: the image does NOT exist until the first CI build pushes.
        # Trigger Coolify only AFTER deploy-production.yml succeeds once.
        image: ghcr.io/${GITHUB_REPOSITORY:-your-org/colab-client2}:${IMAGE_TAG:-production-latest}
        pull_policy: always
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.portal.rule=Host(`${APP_HOST}`)"
            - "traefik.http.routers.portal.entrypoints=websecure"
            - "traefik.http.routers.portal.tls.certresolver=letsencrypt"
            - "traefik.http.services.portal.loadbalancer.server.port=80"
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
            interval: 30s
            timeout: 5s
            retries: 3
