# Coolify resource: colab-client2 (staging).

services:
    web:
        image: ghcr.io/${GITHUB_REPOSITORY:-your-org/colab-client2}:${IMAGE_TAG:-staging-latest}
        pull_policy: always
        restart: unless-stopped
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.portal-staging.rule=Host(`${APP_HOST}`)"
            - "traefik.http.routers.portal-staging.entrypoints=websecure"
            - "traefik.http.routers.portal-staging.tls.certresolver=letsencrypt-staging"
            - "traefik.http.services.portal-staging.loadbalancer.server.port=80"
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
            interval: 30s
            timeout: 5s
            retries: 3
